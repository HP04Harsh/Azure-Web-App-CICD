name: React App Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build React app
      - name: Build app
        run: npm run build

      # 5. Verify build output (IMPORTANT DEBUG)
      - name: Verify dist folder
        run: |
          echo "===== DIST CONTENT ====="
          ls -R dist

      # 6. Create clean deploy folder
      - name: Prepare clean deploy folder
        run: |
          rm -rf deploy
          mkdir deploy
          cp -r dist/* deploy/

      # 7. Verify deploy folder
      - name: Verify deploy folder
        run: |
          echo "===== DEPLOY CONTENT ====="
          ls -R deploy

      # 8. Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: gondia
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
          clean: true